<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VocabQuest — 老師後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Fredoka', 'Noto Sans TC', 'sans-serif'],
          sans: ['Nunito', 'Noto Sans TC', 'sans-serif'],
        },
        colors: {
          primary: { DEFAULT: '#EA580C', dark: '#C2410C', light: '#FDBA74', bg: '#FFF7ED' },
          amber2: '#F59E0B',
          okay: '#16A34A',
          learn: '#4F46E5',
        },
        borderRadius: { xl2: '1.25rem' },
        boxShadow: {
          card: '0 2px 6px -1px rgb(124 45 18 / 0.08), 0 10px 24px -10px rgb(124 45 18 / 0.15)',
        },
      },
    },
  };
</script>
<style>
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes pop { 0% { transform: scale(.96); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .anim-pop { animation: pop .18s ease-out; }
  @media (prefers-reduced-motion: reduce) { .anim-pop { animation: none; } }
</style>
</head>
<body class="min-h-screen bg-primary-bg pb-24 font-sans text-slate-800 antialiased">

<header class="sticky top-0 z-40 border-b border-orange-100 bg-white/90 backdrop-blur">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-primary to-amber2 text-white" aria-hidden="true">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none"><path d="M4 19V6a2 2 0 012-2h13v13H6a2 2 0 00-2 2zm0 0a2 2 0 002 2h13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="font-display text-lg font-semibold text-slate-900">VocabQuest <span class="ml-1 rounded-full bg-orange-100 px-2 py-0.5 text-xs font-bold text-primary">老師後台</span></span>
    </div>
    <div class="flex items-center gap-3">
      <span id="topbar-name" class="hidden text-sm font-bold text-slate-600 sm:inline"></span>
      <a href="guide.html" class="rounded-lg px-3 py-1.5 text-sm font-bold text-slate-500 transition hover:bg-orange-50 hover:text-primary">📖 使用手冊</a>
      <button onclick="logout()" class="rounded-lg px-3 py-1.5 text-sm font-bold text-slate-500 transition hover:bg-orange-50 hover:text-primary">登出</button>
    </div>
  </div>
</header>

<main class="mx-auto max-w-5xl px-4 pt-6">
  <section id="view-dashboard" class="space-y-6"></section>
  <section id="view-students" class="hidden space-y-6"></section>
  <section id="view-student-detail" class="hidden space-y-6"></section>
  <section id="view-sets" class="hidden space-y-6"></section>
</main>

<!-- 底部導覽 -->
<nav id="bottom-nav" class="fixed inset-x-0 bottom-0 z-40 border-t border-orange-100 bg-white/95 backdrop-blur" aria-label="主導覽">
  <div class="mx-auto flex max-w-5xl">
    <button data-nav="dashboard" class="nav-btn flex flex-1 flex-col items-center gap-0.5 py-2.5 text-primary">
      <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-10.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      <span class="text-xs font-bold">總覽</span>
    </button>
    <button data-nav="students" class="nav-btn flex flex-1 flex-col items-center gap-0.5 py-2.5 text-slate-400">
      <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-xs font-bold">學生</span>
    </button>
    <button data-nav="sets" class="nav-btn flex flex-1 flex-col items-center gap-0.5 py-2.5 text-slate-400">
      <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 006.5 22H20V2H6.5A2.5 2.5 0 004 4.5v15z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-xs font-bold">單字集</span>
    </button>
  </div>
</nav>

<!-- Modal 容器 -->
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script>
  if (typeof sb === 'undefined') {
    document.body.innerHTML = `
      <main style="max-width:420px;margin:15vh auto;padding:24px;text-align:center;font-family:sans-serif;color:#334155">
        <p style="font-size:32px">⚠️</p>
        <h1 style="font-size:18px;font-weight:700;margin-top:8px">網站資源載入失敗</h1>
        <p style="margin-top:8px;color:#64748b;line-height:1.6">
          請先重新整理頁面（電腦按 Ctrl+Shift+R 強制重新整理）。<br />
          若持續發生，代表網站部署不完整，請確認 js/config.js 與 js/common.js 有正確上傳到伺服器。
        </p>
      </main>`;
    throw new Error('common.js / config.js 未成功載入，sb 未定義');
  }
</script>
<script src="js/teacher.js"></script>
</body>
</html>
