<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VocabQuest — 我的學習</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Fredoka', 'Noto Sans TC', 'sans-serif'],
          sans: ['Nunito', 'Noto Sans TC', 'sans-serif'],
        },
        colors: {
          primary: { DEFAULT: '#EA580C', dark: '#C2410C', light: '#FDBA74', bg: '#FFF7ED' },
          amber2: '#F59E0B',
          okay: '#16A34A',
          learn: '#4F46E5',
        },
        borderRadius: { xl2: '1.25rem' },
        boxShadow: {
          card: '0 2px 6px -1px rgb(124 45 18 / 0.08), 0 10px 24px -10px rgb(124 45 18 / 0.15)',
        },
      },
    },
  };
</script>
<style>
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes pop { 0% { transform: scale(.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .anim-pop { animation: pop .2s ease-out; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  .anim-shake { animation: shake .3s ease-in-out; }
  @media (prefers-reduced-motion: reduce) { .anim-pop, .anim-shake { animation: none; } }
</style>
</head>
<body class="min-h-screen bg-primary-bg pb-24 font-sans text-slate-800 antialiased">

<!-- 頂部列 -->
<header class="sticky top-0 z-40 border-b border-orange-100 bg-white/90 backdrop-blur">
  <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-primary to-amber2 text-white" aria-hidden="true">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none"><path d="M4 19V6a2 2 0 012-2h13v13H6a2 2 0 00-2 2zm0 0a2 2 0 002 2h13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="font-display text-lg font-semibold text-slate-900">VocabQuest</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="topbar-name" class="text-sm font-bold text-slate-600"></span>
      <button onclick="logout()" class="rounded-lg px-3 py-1.5 text-sm font-bold text-slate-500 transition hover:bg-orange-50 hover:text-primary">登出</button>
    </div>
  </div>
</header>

<main class="mx-auto max-w-3xl px-4 pt-6">
  <!-- ===== 儀表板 ===== -->
  <section id="view-dashboard" class="space-y-6"></section>

  <!-- ===== 練習 ===== -->
  <section id="view-practice" class="hidden"></section>

  <!-- ===== 學習進度 ===== -->
  <section id="view-progress" class="hidden space-y-6"></section>

  <!-- ===== 錯題本 ===== -->
  <section id="view-wrongbook" class="hidden space-y-6"></section>
</main>

<!-- 底部導覽（手機友善） -->
<nav id="bottom-nav" class="fixed inset-x-0 bottom-0 z-40 border-t border-orange-100 bg-white/95 backdrop-blur" aria-label="主導覽">
  <div class="mx-auto flex max-w-3xl">
    <button data-nav="dashboard" class="nav-btn flex flex-1 flex-col items-center gap-0.5 py-2.5 text-primary">
      <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-10.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      <span class="text-xs font-bold">首頁</span>
    </button>
    <button data-nav="progress" class="nav-btn flex flex-1 flex-col items-center gap-0.5 py-2.5 text-slate-400">
      <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 3v18h18M8 17V9m5 8V5m5 12v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-xs font-bold">進度</span>
    </button>
    <button data-nav="wrongbook" class="nav-btn flex flex-1 flex-col items-center gap-0.5 py-2.5 text-slate-400">
      <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 9v4m0 4h.01M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-xs font-bold">錯題本</span>
    </button>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script>
  if (typeof sb === 'undefined') {
    document.body.innerHTML = `
      <main style="max-width:420px;margin:15vh auto;padding:24px;text-align:center;font-family:sans-serif;color:#334155">
        <p style="font-size:32px">⚠️</p>
        <h1 style="font-size:18px;font-weight:700;margin-top:8px">網站資源載入失敗</h1>
        <p style="margin-top:8px;color:#64748b;line-height:1.6">
          請先重新整理頁面（電腦按 Ctrl+Shift+R 強制重新整理）。<br />
          若持續發生，代表網站部署不完整，請確認 js/config.js 與 js/common.js 有正確上傳到伺服器。
        </p>
      </main>`;
    throw new Error('common.js / config.js 未成功載入，sb 未定義');
  }
</script>
<script src="js/student.js"></script>
</body>
</html>
